<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creative Loading Animations</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1 class="page-title">Creative <span>Loading Animations</span></h1>
        
        <!-- Animation 1: Modern Pulsing Dots -->
        <section class="animation-section">
            <h2 class="section-title">01. Modern Pulsing Dots</h2>
            <div class="loader-wrapper">
                <div class="loader-modern">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
        </section>

        <!-- Animation 2: Spinning Rings -->
        <section class="animation-section">
            <h2 class="section-title">02. Spinning Rings</h2>
            <div class="loader-wrapper">
                <div class="spinner-ring">
                    <div></div>
                    <div></div>
                    <div></div>
                    <div></div>
                </div>
            </div>
        </section>

        <!-- Animation 3: Bouncing Balls -->
        <section class="animation-section">
            <h2 class="section-title">03. Bouncing Balls</h2>
            <div class="loader-wrapper">
                <div class="bouncing-balls">
                    <div class="ball"></div>
                    <div class="ball"></div>
                    <div class="ball"></div>
                </div>
            </div>
        </section>

        <!-- Animation 4: Progress Bar -->
        <section class="animation-section">
            <h2 class="section-title">04. Gradient Progress</h2>
            <div class="loader-wrapper">
                <div class="progress-loader">
                    <div class="progress-bar"></div>
                </div>
            </div>
        </section>

        <!-- Animation 5: Neon Pulse -->
        <section class="animation-section">
            <h2 class="section-title">05. Neon Pulse</h2>
            <div class="loader-wrapper">
                <div class="neon-pulse">
                    <div class="neon-circle"></div>
                    <div class="neon-circle"></div>
                    <div class="neon-circle"></div>
                </div>
            </div>
        </section>

        <!-- Animation 6: Cube Spinner -->
        <section class="animation-section">
            <h2 class="section-title">06. 3D Cube Spinner</h2>
            <div class="loader-wrapper">
                <div class="cube-spinner">
                    <div class="cube-face"></div>
                    <div class="cube-face"></div>
                    <div class="cube-face"></div>
                    <div class="cube-face"></div>
                    <div class="cube-face"></div>
                    <div class="cube-face"></div>
                </div>
            </div>
        </section>

        <!-- Animation 7: Ripple Effect -->
        <section class="animation-section">
            <h2 class="section-title">07. Ripple Waves</h2>
            <div class="loader-wrapper">
                <div class="ripple-loader">
                    <div class="ripple"></div>
                    <div class="ripple"></div>
                    <div class="ripple"></div>
                </div>
            </div>
        </section>

        <!-- Animation 8: Text Loader -->
        <section class="animation-section">
            <h2 class="section-title">08. Animated Text</h2>
            <div class="loader-wrapper">
                <div class="text-loader">
                    <span>L</span>
                    <span>O</span>
                    <span>A</span>
                    <span>D</span>
                    <span>I</span>
                    <span>N</span>
                    <span>G</span>
                    <span>.</span>
                    <span>.</span>
                    <span>.</span>
                </div>
            </div>
        </section>
    </div>

    <!-- Optional JavaScript for additional effects -->
    <script src="script.js"></script>
</body>
</html>
