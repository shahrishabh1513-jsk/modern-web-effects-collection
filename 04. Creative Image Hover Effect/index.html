<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creative Image Hover Effects | Modern Gallery</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header Section -->
    <header class="header">
        <h1 class="main-title">Creative <span>Image Hover</span> Effects</h1>
        <p class="subtitle">Explore 15+ modern hover effects with clip-path, gradients, and animations</p>
    </header>

    <div class="container">
        <!-- Effect Category Navigation -->
        <div class="effect-nav">
            <button class="nav-btn active" data-category="all">All Effects</button>
        </div>

        <!-- Gallery Grid -->
        <div class="gallery-grid" id="galleryGrid">
            <!-- Cards will be generated by JavaScript -->
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <span class="close-lightbox">&times;</span>
        <img class="lightbox-content" id="lightboxImg">
        <div class="lightbox-caption" id="lightboxCaption"></div>
        <button class="lightbox-prev"><i class="fas fa-chevron-left"></i></button>
        <button class="lightbox-next"><i class="fas fa-chevron-right"></i></button>
    </div>

    <!-- Floating Action Button -->
    <button class="fab" id="fab">
        <i class="fas fa-paint-brush"></i>
        <span>Effects</span>
    </button>

    <!-- Effects Panel -->
    <div class="effects-panel" id="effectsPanel">
        <h3>Quick Effects <i class="fas fa-times close-panel"></i></h3>
        <div class="effect-list">
            <div class="effect-item" data-effect="zoom">Zoom In</div>
            <div class="effect-item" data-effect="rotate">Rotate</div>
            <div class="effect-item" data-effect="blur">Blur</div>
            <div class="effect-item" data-effect="grayscale">Grayscale</div>
            <div class="effect-item" data-effect="sepia">Sepia</div>
            <div class="effect-item" data-effect="invert">Invert</div>
            <div class="effect-item" data-effect="flip">Flip</div>
            <div class="effect-item" data-effect="skew">Skew</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
