<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Clock | Stopwatch</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="logo">
                <i class="fas fa-clock"></i>
                <span>TimeMaster</span>
            </div>
            <div class="nav-links">
                <a href="index.html"><i class="fas fa-clock"></i> Clock</a>
                <a href="stopwatch.html" class="active"><i class="fas fa-stopwatch"></i> Stopwatch</a>
            </div>
        </nav>

        <div class="stopwatch-container">
            <div class="stopwatch-display">
                <div class="stopwatch-time" id="display">
                    00:00:00
                </div>
                <div class="stopwatch-labels">
                    <span>Hours</span>
                    <span>Minutes</span>
                    <span>Seconds</span>
                </div>
            </div>

            <div class="stopwatch-controls">
                <button class="control-btn start" id="startBtn">
                    <i class="fas fa-play"></i> Start
                </button>
                <button class="control-btn pause" id="pauseBtn">
                    <i class="fas fa-pause"></i> Pause
                </button>
                <button class="control-btn reset" id="resetBtn">
                    <i class="fas fa-redo-alt"></i> Reset
                </button>
                <button class="control-btn lap" id="lapBtn">
                    <i class="fas fa-flag"></i> Lap
                </button>
            </div>

            <div class="lap-section">
                <h3><i class="fas fa-history"></i> Lap Times</h3>
                <div class="lap-list" id="lapList">
                    <!-- Lap times will appear here -->
                </div>
            </div>
        </div>
    </div>

    <script src="stopwatch.js"></script>
</body>
</html>
